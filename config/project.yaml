# project.yaml — PDK / project level config. Usually one per project.
#
# Assumes you have sourced your Cadence/PDK setup script FIRST, so these
# env vars are already in the shell:
#
#     WORK_ROOT, WORK_ROOT2, VERIFY_ROOT, SETUP_ROOT, PDK_LAYER_MAP_FILE
#
# Auto_ext reads them from the shell — no duplication here needed. If an
# env var is missing, add it under env_overrides below.
#
# Run from the workarea root (./run.sh cd's there for you):
#     ./run.sh check-env --config-dir Auto_ext_pro/config
#     ./run.sh run --config-dir Auto_ext_pro/config --dry-run

templates:
  si: templates\si\default.env.j2
  calibre: templates/calibre/wiodio_noConnectByNetName.qci.j2
  quantus: templates/quantus/ext.cmd.j2
  jivaro: templates/jivaro/default.xml.j2

# Uncomment and fill in only if ``check-env`` reports a var as "missing":
# env_overrides:
#   PDK_LAYER_MAP_FILE: /abs/path/to/layers.map
#   VERIFY_ROOT: /abs/path/to/verify

# Output directory pattern. Format keys available:
#     {cell}  {library}  {task_id}  {lvs_layout_view}  {lvs_source_view}
# Default per-cell isolation:
#     ${WORK_ROOT}/cds/verify/QCI_PATH_<cell>
# To run same-cell with two different knob configs side by side, add a
# discriminator (e.g. lvs_layout_view) so each task gets its own dir:
# extraction_output_dir: "${WORK_ROOT}/cds/verify/QCI_PATH_{cell}_{lvs_layout_view}"
# To match the old flow (all cells share one dir):
# extraction_output_dir: "${WORK_ROOT}/cds/verify/QCI_PATH"

# Project-wide knob overrides. Each template's *.manifest.yaml declares
# the knobs it accepts + defaults; entries here override those defaults
# for every task in this project. Individual tasks can override again
# via tasks.yaml[...].knobs; a single run can override with --knob.
# knobs:
#   quantus:
#     temperature: 25.0
#     exclude_floating_nets_limit: 10000
layer_map: ${PDK_LAYER_MAP_FILE}
knobs:
  quantus:
    exclude_floating_nets_limit: 100
