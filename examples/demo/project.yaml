# Demo project.yaml — runnable on any machine without sourcing a PDK setup.
# env_overrides here fakes the env vars the real flow expects from the
# shell. Production config/project.yaml is much shorter (see config/).
#
# Run from Auto_ext/ root:
#     cd C:\code\Auto_ext\Auto_ext
#     python -m auto_ext run --config-dir examples/demo --dry-run

env_overrides:
  WORK_ROOT: /tmp/demo
  WORK_ROOT2: /tmp/demo
  VERIFY_ROOT: /tmp/demo/verify
  SETUP_ROOT: /tmp/demo/setup
  PDK_LAYER_MAP_FILE: /tmp/demo/pdk/layers.map
  calibre_source_added_place: /tmp/demo/verify/runset/Calibre_QRC/LVS/Ver_Demo/CFXXX/empty.cdl

paths:
  calibre_lvs_dir: $calibre_source_added_place|parent
  qrc_deck_dir: $VERIFY_ROOT/runset/Calibre_QRC/QRC/Ver_Demo/CFXXX/QCI_deck

tech_name: HN001

# DSPF parasitic-output file path used by templates/quantus/dspf.cmd.j2.
# Tokens: ${env}, ${output_dir}, ${intermediate_dir}, ${paths.*}, {cell},
# {library}, {task_id}. Default = ${WORK_ROOT2}/{cell}.dspf.
dspf_out_path: "${WORK_ROOT2}/{cell}.dspf"

templates:
  si: templates/si/default.env.j2
  calibre: templates/calibre/calibre_lvs.qci.j2
  quantus: templates/quantus/ext.cmd.j2
  jivaro: templates/jivaro/default.xml.j2
